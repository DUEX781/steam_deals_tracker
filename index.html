<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Steam 打折游戏检测</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      max-width: 900px;
      margin: 40px auto;
    }

    h1 {
      color: #66c0f4;
    }

    .game {
      background: #1b2838;
      padding: 16px;
      margin-bottom: 12px;
      border-radius: 8px;
    }

    .discount {
      color: #a4d007;
      font-weight: bold;
    }

    a {
      color: #66c0f4;
    }
  </style>
</head>
<body>
  <h1>Steam 当前打折游戏</h1>

  <div id="games">加载中...</div>

  <script>
    async function loadDeals() {
      const res = await fetch('./data/deals.json');
      const games = await res.json();

      const container = document.getElementById('games');
      container.innerHTML = '';

      games.forEach(game => {
        const div = document.createElement('div');
        div.className = 'game';

        div.innerHTML = `
          <h2>${game.name}</h2>
          <p>折扣：<span class="discount">-${game.discount}%</span></p>
          <p>原价：${game.original_price}</p>
          <p>现价：${game.final_price}</p>
          <a href="${game.url}" target="_blank">查看 Steam 页面</a>
        `;

        container.appendChild(div);
      });
    }

    loadDeals();
  </script>
</body>
</html>
