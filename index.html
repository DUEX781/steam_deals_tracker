<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Steam 打折游戏检测</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      max-width: 900px;
      margin: 40px auto;
    }

    h1 {
      color: #66c0f4;
    }

    .game {
      background: #1b2838;
      padding: 16px;
      margin-bottom: 12px;
      border-radius: 8px;
    }

    .discount {
      color: #a4d007;
      font-weight: bold;
    }

    a {
      color: #66c0f4;
    }

    .stats-button {
      background: #66c0f4;
      color: #111;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .stats-button:hover {
      background: #8ecbf7;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
    }

    .modal-content {
      background: #1b2838;
      margin: 6% auto;
      padding: 24px;
      width: 80%;
      max-width: 850px;
      border-radius: 10px;
      color: #eee;
    }

    .close {
      float: right;
      font-size: 28px;
      cursor: pointer;
      color: #aaa;
    }

    .close:hover {
      color: #fff;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin: 20px 0;
    }

    .stat-card {
      background: #111820;
      padding: 14px;
      border-radius: 8px;
    }

    .stat-number {
      color: #a4d007;
      font-size: 22px;
      font-weight: bold;
    }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin: 20px 0;
    }

    .filter-field {
      background: #111820;
      padding: 14px;
      border-radius: 8px;
    }

    .filter-field label {
      display: block;
      margin-bottom: 8px;
      color: #c8d2e0;
      font-weight: bold;
    }

    .filter-field select {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid rgba(102, 192, 244, 0.25);
      background: rgba(255, 255, 255, 0.92);
      font-size: 14px;
    }

    .filter-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 18px;
    }

    .filter-summary {
      color: #aab6c5;
      margin: 0;
    }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin: 28px 0 10px;
    }

    .page-button {
      min-width: 92px;
      background: linear-gradient(135deg, #66c0f4, #a4d007);
      color: #07111e;
      border: none;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
    }

    .page-button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
      transform: none;
    }

    .page-info {
      min-width: 150px;
      text-align: center;
      color: #c8d2e0;
      font-weight: bold;
    }

    canvas {
      background: #111820;
      border-radius: 8px;
      padding: 10px;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      margin: 20px 0;
      flex-wrap: wrap;
    }

    .toolbar input,
    .toolbar select {
      padding: 10px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
    }

    .toolbar input {
      min-width: 240px;
    }

    .description {
      color: #ccc;
      line-height: 1.5;
    }

    .review {
      background: #111820;
      padding: 12px;
      border-radius: 6px;
      margin-top: 10px;
      color: #ddd;
    }

    .meta {
      color: #aaa;
      font-size: 14px;
    }

    :root {
      --mouse-x: 50vw;
      --mouse-y: 50vh;
    }

    body {
      font-family: Arial, sans-serif;
      max-width: 1100px;
      margin: 0 auto;
      padding: 30px;
      color: #e8f0ff;
      background: #070b12;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -2;
      background:
        radial-gradient(circle at var(--mouse-x) var(--mouse-y), rgba(102, 192, 244, 0.22), transparent 15%),
        radial-gradient(circle at 15% 20%, rgba(164, 208, 7, 0.12), transparent 28%),
        radial-gradient(circle at 85% 70%, rgba(95, 80, 255, 0.16), transparent 32%),
        linear-gradient(135deg, #070b12 0%, #0d1624 45%, #101827 100%);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      background-image:
        linear-gradient(rgba(102, 192, 244, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(102, 192, 244, 0.06) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent 80%);
      animation: gridMove 18s linear infinite;
    }

    @keyframes gridMove {
      from {
        background-position: 0 0;
      }
      to {
        background-position: 84px 84px;
      }
    }

    h1 {
      color: #8ecbf7;
      font-size: 42px;
      letter-spacing: 1px;
      text-shadow: 0 0 18px rgba(102, 192, 244, 0.35);
    }

    .toolbar {
      display: flex;
      gap: 14px;
      margin: 24px 0;
      flex-wrap: wrap;
    }

    .toolbar input,
    .toolbar select {
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(102, 192, 244, 0.25);
      background: rgba(255, 255, 255, 0.92);
      font-size: 15px;
      outline: none;
    }

    .toolbar input {
      min-width: 260px;
    }

    .stats-button {
      background: linear-gradient(135deg, #66c0f4, #a4d007);
      color: #07111e;
      border: none;
      padding: 12px 18px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 0 20px rgba(102, 192, 244, 0.25);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .stats-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 28px rgba(102, 192, 244, 0.45);
    }

    .game {
      position: relative;
      background: rgba(27, 40, 56, 0.72);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(102, 192, 244, 0.18);
      padding: 20px;
      margin-bottom: 22px;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .game::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent, rgba(102, 192, 244, 0.08), transparent);
      transform: translateX(-100%);
      transition: transform 0.6s ease;
    }

    .game:hover {
      transform: translateY(-5px) scale(1.01);
      border-color: rgba(102, 192, 244, 0.5);
      box-shadow: 0 22px 65px rgba(102, 192, 244, 0.16);
    }

    .game:hover::before {
      transform: translateX(100%);
    }

    .game-card {
      position: relative;
      display: flex;
      gap: 24px;
      align-items: flex-start;
      z-index: 1;
    }

    .game-left {
      width: 300px;
      flex-shrink: 0;
    }

    .game-cover-wrap {
      overflow: hidden;
      border-radius: 14px;
      background: #111820;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    .game-cover {
      width: 100%;
      display: block;
      object-fit: cover;
      transition: transform 0.35s ease;
    }

    .game:hover .game-cover {
      transform: scale(1.06);
    }

    .cover-meta {
      margin-top: 12px;
      background: rgba(7, 11, 18, 0.65);
      border: 1px solid rgba(102, 192, 244, 0.15);
      border-radius: 14px;
      padding: 12px;
    }

    .score-pill {
      display: inline-block;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(164, 208, 7, 0.15);
      color: #a4d007;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .side-line {
      color: #c8d2e0;
      font-size: 14px;
      line-height: 1.6;
    }

    .tag-list {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .tag {
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 12px;
      color: #dbeafe;
      background: rgba(102, 192, 244, 0.14);
      border: 1px solid rgba(102, 192, 244, 0.18);
    }

    .game-info {
      flex: 1;
    }

    .game-info h2 {
      font-size: 28px;
      margin-top: 4px;
      margin-bottom: 18px;
    }

    .discount {
      color: #a4d007;
      font-weight: bold;
    }

    .meta {
      color: #aab6c5;
      font-size: 14px;
    }

    .description {
      color: #d6deeb;
      line-height: 1.7;
    }

    .review {
      background: rgba(7, 11, 18, 0.68);
      padding: 15px;
      border-radius: 12px;
      margin-top: 14px;
      color: #ddd;
      border: 1px solid rgba(255,255,255,0.06);
    }

    a {
      color: #8ecbf7;
    }

    @media (max-width: 800px) {
      body {
        padding: 20px;
      }

      .filter-grid,
      .stats-grid {
        grid-template-columns: 1fr;
      }

      .game-card {
        flex-direction: column;
      }

      .game-left {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <h1>Steam 当前打折游戏</h1>
  <div class="button-row">
    <a class="stats-button" href="index.html" style="text-decoration: none;">折扣列表</a>
    <a class="stats-button" href="search.html" style="text-decoration: none;">Steam 搜索</a>
    <a class="stats-button" href="favorites.html" style="text-decoration: none;">收藏</a>
  </div>
  <p id="updated">更新时间：加载中...</p>

  <div class="toolbar">
    <input id="searchInput" type="text" placeholder="搜索游戏名..." oninput="handleListCriteriaChange()">

    <select id="sortSelect" onchange="handleListCriteriaChange()">
      <option value="popularity_desc">按热度排序：高到低</option>
      <option value="name_asc">按名称排序：A-Z</option>
      <option value="name_desc">按名称排序：Z-A</option>
      <option value="price_asc">按价格排序：低到高</option>
      <option value="price_desc">按价格排序：高到低</option>
      <option value="discount_desc">按折扣排序：高到低</option>
    </select>
  </div>

  <p id="gameCount"></p>

  <div class="button-row">
    <button class="stats-button" onclick="openFilterModal()">分类筛选</button>
    <button class="stats-button" onclick="openStatsModal()">查看流量监测</button>
  </div>

  <div id="filterModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeFilterModal()">&times;</span>

      <h2>分类筛选</h2>
      <p>按照折扣力度、价格区间和游戏类型筛选当前折扣游戏。</p>

      <div class="filter-grid">
        <div class="filter-field">
          <label for="discountFilter">折扣力度</label>
          <select id="discountFilter">
            <option value="all">全部折扣</option>
            <option value="80">80% 及以上</option>
            <option value="70">70% 及以上</option>
            <option value="50">50% 及以上</option>
            <option value="30">30% 及以上</option>
          </select>
        </div>

        <div class="filter-field">
          <label for="priceFilter">价格区间</label>
          <select id="priceFilter">
            <option value="all">全部价格</option>
            <option value="0-20">¥20 以内</option>
            <option value="20-50">¥20 - ¥50</option>
            <option value="50-100">¥50 - ¥100</option>
            <option value="100-999999">¥100 以上</option>
          </select>
        </div>

        <div class="filter-field">
          <label for="genreFilter">游戏类型</label>
          <select id="genreFilter">
            <option value="all">全部类型</option>
          </select>
        </div>
      </div>

      <div class="filter-actions">
        <button class="stats-button" onclick="applyFilters()">应用筛选</button>
        <button class="stats-button" onclick="clearFilters()">清空筛选</button>
        <p id="filterSummary" class="filter-summary">当前未启用筛选</p>
      </div>
    </div>
  </div>

  <div id="statsModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeStatsModal()">&times;</span>

      <h2>网站流量监测</h2>
      <p>这里统计的是当前浏览器加载本网站时产生的请求量，不代表全站所有用户访问量。</p>

      <div class="stats-grid">
        <div class="stat-card">
          <p>本次资源请求数</p>
          <div id="currentRequests" class="stat-number">计算中...</div>
        </div>

        <div class="stat-card">
          <p>本次传输大小</p>
          <div id="currentSize" class="stat-number">计算中...</div>
        </div>

        <div class="stat-card">
          <p>估算月访问上限</p>
          <div id="estimatedMonthlyVisits" class="stat-number">计算中...</div>
        </div>
      </div>

      <h3>最近访问流量趋势</h3>
      <canvas id="trafficChart" width="800" height="320"></canvas>

      <p style="margin-top: 16px; color: #aaa;">
        说明：折线图数据保存在当前浏览器 localStorage 中，换设备或清缓存后会重置。
      </p>
    </div>
  </div>
  <div id="games">加载中...</div>
  <div id="pagination" class="pagination" style="display: none;">
    <button id="prevPageButton" class="page-button" onclick="changePage(-1)">上一页</button>
    <span id="pageInfo" class="page-info">第 1 / 1 页</span>
    <button id="nextPageButton" class="page-button" onclick="changePage(1)">下一页</button>
  </div>

<script>
  let allDeals = [];
  const PAGE_SIZE = 50;
  let currentPage = 1;
  let activeFilters = {
    discount: 'all',
    price: 'all',
    genre: 'all'
  };

  function escapeHTML(text) {
    if (!text) return '';

    return String(text)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  function formatDiscountDeadline(game) {
    if (game.discount_expiration) {
      const date = new Date(Number(game.discount_expiration) * 1000);

      if (!Number.isNaN(date.getTime())) {
        return date.toLocaleString('zh-CN', {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit'
        });
      }
    }

    return game.discount_deadline_text || game.discount_expires_at || '未知';
  }

  function getFilterLabel(selectId) {
    const select = document.getElementById(selectId);
    return select?.options[select.selectedIndex]?.text || '';
  }

  function populateGenreFilter() {
    const genreSelect = document.getElementById('genreFilter');

    if (!genreSelect) return;

    const genres = new Set();

    allDeals.forEach(game => {
      if (!Array.isArray(game.genres)) return;

      game.genres.forEach(genre => {
        if (genre) genres.add(genre);
      });
    });

    genreSelect.innerHTML = '<option value="all">全部类型</option>';

    [...genres]
      .sort((a, b) => a.localeCompare(b, 'zh-CN'))
      .forEach(genre => {
        const option = document.createElement('option');
        option.value = genre;
        option.textContent = genre;
        genreSelect.appendChild(option);
      });
  }

  function updateFilterSummary() {
    const summary = document.getElementById('filterSummary');

    if (!summary) return;

    const labels = [];

    if (activeFilters.discount !== 'all') {
      labels.push(getFilterLabel('discountFilter'));
    }

    if (activeFilters.price !== 'all') {
      labels.push(getFilterLabel('priceFilter'));
    }

    if (activeFilters.genre !== 'all') {
      labels.push(getFilterLabel('genreFilter'));
    }

    summary.innerText = labels.length > 0
      ? `当前筛选：${labels.join(' / ')}`
      : '当前未启用筛选';
  }

  function gameMatchesFilters(game, filters = activeFilters) {
    if (filters.discount !== 'all') {
      const minDiscount = Number(filters.discount);

      if ((game.discount || 0) < minDiscount) {
        return false;
      }
    }

    if (filters.price !== 'all') {
      const [minPrice, maxPrice] = filters.price.split('-').map(Number);
      const price = Number(game.final_price_num || 0);

      if (price < minPrice || price > maxPrice) {
        return false;
      }
    }

    if (filters.genre !== 'all') {
      const genres = Array.isArray(game.genres) ? game.genres : [];

      if (!genres.includes(filters.genre)) {
        return false;
      }
    }

    return true;
  }

  function sortGames(games, sortType) {
    const sortedGames = [...games];

    sortedGames.sort((a, b) => {
      if (sortType === 'name_asc') {
        return a.name.localeCompare(b.name);
      }

      if (sortType === 'name_desc') {
        return b.name.localeCompare(a.name);
      }

      if (sortType === 'price_asc') {
        return (a.final_price_num || 0) - (b.final_price_num || 0);
      }

      if (sortType === 'price_desc') {
        return (b.final_price_num || 0) - (a.final_price_num || 0);
      }

      if (sortType === 'discount_desc') {
        return (b.discount || 0) - (a.discount || 0);
      }

      return (b.popularity || 0) - (a.popularity || 0);
    });

    return sortedGames;
  }

  function getFilteredGames(games, keyword, filters) {
    const normalizedKeyword = keyword.trim().toLowerCase();

    return games.filter(game => {
      return game.name.toLowerCase().includes(normalizedKeyword) && gameMatchesFilters(game, filters);
    });
  }

  function getFilteredSortedGames(games, keyword, filters, sortType) {
    return sortGames(getFilteredGames(games, keyword, filters), sortType);
  }

  function getPageItems(items, page, pageSize) {
    const startIndex = (page - 1) * pageSize;

    return {
      items: items.slice(startIndex, startIndex + pageSize),
      startIndex
    };
  }

  function handleListCriteriaChange() {
    currentPage = 1;
    renderDeals();
  }

  function updatePaginationControls(totalItems) {
    const pagination = document.getElementById('pagination');
    const pageInfo = document.getElementById('pageInfo');
    const prevButton = document.getElementById('prevPageButton');
    const nextButton = document.getElementById('nextPageButton');
    const totalPages = Math.max(1, Math.ceil(totalItems / PAGE_SIZE));

    if (!pagination || !pageInfo || !prevButton || !nextButton) return;

    pagination.style.display = totalItems > PAGE_SIZE ? 'flex' : 'none';
    pageInfo.innerText = `第 ${currentPage} / ${totalPages} 页`;
    prevButton.disabled = currentPage <= 1;
    nextButton.disabled = currentPage >= totalPages;
  }

  function changePage(direction) {
    const keyword = document.getElementById('searchInput')?.value.trim().toLowerCase() || '';
    const totalItems = getFilteredGames(allDeals, keyword, activeFilters).length;
    const totalPages = Math.max(1, Math.ceil(totalItems / PAGE_SIZE));

    currentPage = Math.min(Math.max(currentPage + direction, 1), totalPages);
    renderDeals();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  async function loadDeals() {
    try {
      const res = await fetch('./data/deals.json?time=' + Date.now());
      const data = await res.json();

      if (!data.updated_at || !Array.isArray(data.deals)) {
        throw new Error('deals.json 格式不是最新版');
      }

      document.getElementById('updated').innerText = `更新时间：${data.updated_at}`;
      allDeals = data.deals;
      populateGenreFilter();
      updateFilterSummary();

      renderDeals();
    } catch (error) {
      console.error(error);
      document.getElementById('updated').innerText = '更新时间：读取失败';
      document.getElementById('games').innerHTML = '<p>加载数据失败，请检查 data/deals.json。</p>';
    }
  }

  function renderGameCards(container, games) {
    games.forEach(game => {
      const review = game.top_review || {};
      const reviewType = review.voted_up === true
        ? '好评'
        : review.voted_up === false
          ? '差评'
          : '未知';

      const div = document.createElement('div');
      div.className = 'game';

      const imageUrl = game.image_url || `https://cdn.akamai.steamstatic.com/steam/apps/${game.appid}/header.jpg`;

      const genres = Array.isArray(game.genres) && game.genres.length > 0
        ? game.genres
        : ['暂无类型'];

      const categories = Array.isArray(game.categories) && game.categories.length > 0
        ? game.categories
        : [];

      const genreHTML = genres
        .slice(0, 4)
        .map(item => `<span class="tag">${escapeHTML(item)}</span>`)
        .join('');

      const categoryHTML = categories
        .slice(0, 3)
        .map(item => `<span class="tag">${escapeHTML(item)}</span>`)
        .join('');

      const scoreText = game.metacritic_score
        ? `${game.metacritic_score} / 100`
        : '暂无评分';

      const platformList = [];

      if (game.platforms?.windows) platformList.push('Windows');
      if (game.platforms?.mac) platformList.push('macOS');
      if (game.platforms?.linux) platformList.push('Linux');

      const platformText = platformList.length > 0
        ? platformList.join(' / ')
        : '未知平台';

      const developerText = Array.isArray(game.developers) && game.developers.length > 0
        ? game.developers.join(' / ')
        : '未知开发商';

      const publisherText = Array.isArray(game.publishers) && game.publishers.length > 0
        ? game.publishers.join(' / ')
        : '未知发行商';

      div.innerHTML = `
        <div class="game-card">
          <div class="game-left">
            <div class="game-cover-wrap">
              <img
                class="game-cover"
                src="${escapeHTML(imageUrl)}"
                alt="${escapeHTML(game.name)}"
                loading="lazy"
                onerror="this.style.display='none'"
              >
            </div>

            <div class="cover-meta">
              <div class="score-pill">评分：${escapeHTML(scoreText)}</div>

              <div class="side-line">类型：</div>
              <div class="tag-list">${genreHTML}</div>

              ${categoryHTML ? `
                <div class="side-line" style="margin-top: 10px;">特性：</div>
                <div class="tag-list">${categoryHTML}</div>
              ` : ''}

              <div class="side-line" style="margin-top: 10px;">平台：${escapeHTML(platformText)}</div>
              <div class="side-line">发行日期：${escapeHTML(game.release_date || '未知')}</div>
              <div class="side-line">开发商：${escapeHTML(developerText)}</div>
              <div class="side-line">发行商：${escapeHTML(publisherText)}</div>
            </div>
          </div>

          <div class="game-info">
            <h2>${escapeHTML(game.name)}</h2>

            <p>
              折扣：<span class="discount">-${game.discount}%</span>
              ｜ 现价：${escapeHTML(game.final_price)}
              ｜ 原价：${escapeHTML(game.original_price)}
              ｜ 截止：${escapeHTML(formatDiscountDeadline(game))}
            </p>

            <p class="meta">
              热度：${Number(game.popularity || 0).toLocaleString()} 条推荐/评论
            </p>

            <p class="description">
              ${escapeHTML(game.description || '暂无简介')}
            </p>

            <div class="review">
              <strong>热门评论：</strong>
              <p>${escapeHTML(review.text || '暂无热门评论')}</p>
              <p class="meta">
                类型：${reviewType}
                ｜ 有用票数：${Number(review.votes_up || 0).toLocaleString()}
              </p>
            </div>

            <p>
              <a href="${escapeHTML(game.url)}" target="_blank">查看 Steam 页面</a>
            </p>
          </div>
        </div>
      `;

      container.appendChild(div);
    });
  }

  function renderDeals() {
    const keyword = document.getElementById('searchInput')?.value.trim().toLowerCase() || '';
    const sortType = document.getElementById('sortSelect')?.value || 'popularity_desc';

    const games = getFilteredSortedGames(allDeals, keyword, activeFilters, sortType);

    const container = document.getElementById('games');
    container.innerHTML = '';

    const hasFilters = Object.values(activeFilters).some(value => value !== 'all');
    const filterText = hasFilters ? '（已筛选）' : '';
    const totalPages = Math.max(1, Math.ceil(games.length / PAGE_SIZE));

    currentPage = Math.min(Math.max(currentPage, 1), totalPages);

    updatePaginationControls(games.length);

    if (games.length === 0) {
      document.getElementById('gameCount').innerText = `当前显示 0 / ${allDeals.length} 个打折游戏${filterText}`;
      container.innerHTML = '<p>没有找到符合条件的游戏。</p>';
      return;
    }

    const { items: pageGames, startIndex } = getPageItems(games, currentPage, PAGE_SIZE);
    const pageStart = startIndex + 1;
    const pageEnd = startIndex + pageGames.length;

    document.getElementById('gameCount').innerText = `当前显示 ${pageStart}-${pageEnd} / ${games.length} 个打折游戏${filterText}`;

    renderGameCards(container, pageGames);
  }

  function formatBytes(bytes) {
    if (!bytes || bytes <= 0) return '0 KB';

    const units = ['B', 'KB', 'MB', 'GB'];
    let size = bytes;
    let unitIndex = 0;

    while (size >= 1024 && unitIndex < units.length - 1) {
      size /= 1024;
      unitIndex++;
    }

    return `${size.toFixed(2)} ${units[unitIndex]}`;
  }

  function getTrafficStats() {
    const resources = performance.getEntriesByType('resource');

    let totalBytes = 0;

    resources.forEach(resource => {
      if (resource.transferSize && resource.transferSize > 0) {
        totalBytes += resource.transferSize;
      }
    });

    const htmlEstimate = 30 * 1024;
    const estimatedVisitBytes = totalBytes + htmlEstimate;

    return {
      time: new Date().toLocaleString(),
      requestCount: resources.length,
      totalBytes: estimatedVisitBytes,
      totalKB: Number((estimatedVisitBytes / 1024).toFixed(2))
    };
  }

  function saveTrafficStats() {
    const currentStats = getTrafficStats();

    let history = JSON.parse(localStorage.getItem('trafficHistory') || '[]');
    history.push(currentStats);

    if (history.length > 20) {
      history = history.slice(history.length - 20);
    }

    localStorage.setItem('trafficHistory', JSON.stringify(history));

    return currentStats;
  }

  function updateStatsNumbers(stats) {
    const monthlyLimitBytes = 100 * 1024 * 1024 * 1024;
    const estimatedVisits = Math.floor(monthlyLimitBytes / stats.totalBytes);

    document.getElementById('currentRequests').innerText = stats.requestCount;
    document.getElementById('currentSize').innerText = formatBytes(stats.totalBytes);
    document.getElementById('estimatedMonthlyVisits').innerText = estimatedVisits.toLocaleString();
  }

  function drawTrafficChart() {
    const canvas = document.getElementById('trafficChart');
    const ctx = canvas.getContext('2d');

    const history = JSON.parse(localStorage.getItem('trafficHistory') || '[]');

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (history.length < 2) {
      ctx.fillStyle = '#eee';
      ctx.font = '18px Arial';
      ctx.fillText('访问记录不足，多打开几次弹窗后会形成折线图。', 40, 160);
      return;
    }

    const padding = 50;
    const chartWidth = canvas.width - padding * 2;
    const chartHeight = canvas.height - padding * 2;

    const values = history.map(item => item.totalKB);
    const maxValue = Math.max(...values);
    const minValue = Math.min(...values);
    const range = maxValue - minValue || 1;

    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1;

    for (let i = 0; i <= 4; i++) {
      const y = padding + (chartHeight / 4) * i;
      ctx.beginPath();
      ctx.moveTo(padding, y);
      ctx.lineTo(canvas.width - padding, y);
      ctx.stroke();
    }

    ctx.fillStyle = '#aaa';
    ctx.font = '12px Arial';
    ctx.fillText(`${maxValue.toFixed(2)} KB`, 8, padding + 5);
    ctx.fillText(`${minValue.toFixed(2)} KB`, 8, canvas.height - padding);

    ctx.strokeStyle = '#66c0f4';
    ctx.lineWidth = 3;
    ctx.beginPath();

    values.forEach((value, index) => {
      const x = padding + (chartWidth / (values.length - 1)) * index;
      const y = padding + chartHeight - ((value - minValue) / range) * chartHeight;

      if (index === 0) {
        ctx.moveTo(x, y);
      } else {
        ctx.lineTo(x, y);
      }
    });

    ctx.stroke();

    values.forEach((value, index) => {
      const x = padding + (chartWidth / (values.length - 1)) * index;
      const y = padding + chartHeight - ((value - minValue) / range) * chartHeight;

      ctx.fillStyle = '#a4d007';
      ctx.beginPath();
      ctx.arc(x, y, 4, 0, Math.PI * 2);
      ctx.fill();
    });

    ctx.fillStyle = '#eee';
    ctx.font = '14px Arial';
    ctx.fillText('单次访问估算流量 KB', padding, 24);
  }

  function openFilterModal() {
    document.getElementById('discountFilter').value = activeFilters.discount;
    document.getElementById('priceFilter').value = activeFilters.price;
    document.getElementById('genreFilter').value = activeFilters.genre;
    updateFilterSummary();

    document.getElementById('filterModal').style.display = 'block';
  }

  function closeFilterModal() {
    document.getElementById('filterModal').style.display = 'none';
  }

  function applyFilters() {
    activeFilters = {
      discount: document.getElementById('discountFilter')?.value || 'all',
      price: document.getElementById('priceFilter')?.value || 'all',
      genre: document.getElementById('genreFilter')?.value || 'all'
    };

    currentPage = 1;
    updateFilterSummary();
    renderDeals();
    closeFilterModal();
  }

  function clearFilters() {
    activeFilters = {
      discount: 'all',
      price: 'all',
      genre: 'all'
    };

    document.getElementById('discountFilter').value = 'all';
    document.getElementById('priceFilter').value = 'all';
    document.getElementById('genreFilter').value = 'all';

    currentPage = 1;
    updateFilterSummary();
    renderDeals();
  }

  function openStatsModal() {
    const stats = saveTrafficStats();
    updateStatsNumbers(stats);
    drawTrafficChart();

    document.getElementById('statsModal').style.display = 'block';
  }

  function closeStatsModal() {
    document.getElementById('statsModal').style.display = 'none';
  }

  window.onclick = function(event) {
    const statsModal = document.getElementById('statsModal');
    const filterModal = document.getElementById('filterModal');

    if (event.target === statsModal) {
      closeStatsModal();
    }

    if (event.target === filterModal) {
      closeFilterModal();
    }
  };

  document.addEventListener('pointermove', (event) => {
    document.documentElement.style.setProperty('--mouse-x', `${event.clientX}px`);
    document.documentElement.style.setProperty('--mouse-y', `${event.clientY}px`);
  });

  loadDeals();

</script>
</body>
</html>
