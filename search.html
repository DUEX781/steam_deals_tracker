<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Steam 游戏搜索</title>
  <style>
    :root {
      --mouse-x: 50vw;
      --mouse-y: 50vh;
    }

    body {
      font-family: Arial, sans-serif;
      max-width: 1100px;
      margin: 0 auto;
      padding: 30px;
      color: #e8f0ff;
      background: #070b12;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -2;
      background:
        radial-gradient(circle at var(--mouse-x) var(--mouse-y), rgba(102, 192, 244, 0.22), transparent 15%),
        radial-gradient(circle at 15% 20%, rgba(164, 208, 7, 0.12), transparent 28%),
        radial-gradient(circle at 85% 70%, rgba(95, 80, 255, 0.16), transparent 32%),
        linear-gradient(135deg, #070b12 0%, #0d1624 45%, #101827 100%);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      background-image:
        linear-gradient(rgba(102, 192, 244, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(102, 192, 244, 0.06) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent 80%);
      animation: gridMove 18s linear infinite;
    }

    @keyframes gridMove {
      from { background-position: 0 0; }
      to { background-position: 84px 84px; }
    }

    h1 {
      color: #8ecbf7;
      font-size: 42px;
      letter-spacing: 1px;
      text-shadow: 0 0 18px rgba(102, 192, 244, 0.35);
    }

    a {
      color: #8ecbf7;
    }

    .button-row,
    .toolbar {
      display: flex;
      gap: 14px;
      margin: 24px 0;
      flex-wrap: wrap;
      align-items: center;
    }

    .toolbar input,
    .toolbar select {
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(102, 192, 244, 0.25);
      background: rgba(255, 255, 255, 0.92);
      font-size: 15px;
      outline: none;
    }

    .toolbar input {
      min-width: 300px;
    }

    .stats-button,
    .favorite-button,
    .page-button {
      background: linear-gradient(135deg, #66c0f4, #a4d007);
      color: #07111e;
      border: none;
      padding: 12px 18px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 0 20px rgba(102, 192, 244, 0.25);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      text-decoration: none;
    }

    .stats-button:hover,
    .favorite-button:hover,
    .page-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 28px rgba(102, 192, 244, 0.45);
    }

    .favorite-button.is-favorite {
      background: linear-gradient(135deg, #a4d007, #ffcf5a);
    }

    .game {
      position: relative;
      background: rgba(27, 40, 56, 0.72);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(102, 192, 244, 0.18);
      padding: 20px;
      margin-bottom: 22px;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .game:hover {
      transform: translateY(-5px) scale(1.01);
      border-color: rgba(102, 192, 244, 0.5);
      box-shadow: 0 22px 65px rgba(102, 192, 244, 0.16);
    }

    .game-card {
      position: relative;
      display: flex;
      gap: 24px;
      align-items: flex-start;
      z-index: 1;
    }

    .game-left {
      width: 300px;
      flex-shrink: 0;
    }

    .game-cover-wrap {
      overflow: hidden;
      border-radius: 14px;
      background: #111820;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    .game-cover {
      width: 100%;
      display: block;
      object-fit: cover;
    }

    .cover-meta {
      margin-top: 12px;
      background: rgba(7, 11, 18, 0.65);
      border: 1px solid rgba(102, 192, 244, 0.15);
      border-radius: 14px;
      padding: 12px;
    }

    .score-pill {
      display: inline-block;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(164, 208, 7, 0.15);
      color: #a4d007;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .side-line {
      color: #c8d2e0;
      font-size: 14px;
      line-height: 1.6;
    }

    .tag-list {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .tag {
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 12px;
      color: #dbeafe;
      background: rgba(102, 192, 244, 0.14);
      border: 1px solid rgba(102, 192, 244, 0.18);
    }

    .game-info {
      flex: 1;
    }

    .game-info h2 {
      font-size: 28px;
      margin-top: 4px;
      margin-bottom: 18px;
    }

    .discount {
      color: #a4d007;
      font-weight: bold;
    }

    .meta {
      color: #aab6c5;
      font-size: 14px;
    }

    .description {
      color: #d6deeb;
      line-height: 1.7;
    }

    .review {
      background: rgba(7, 11, 18, 0.68);
      padding: 15px;
      border-radius: 12px;
      margin-top: 14px;
      color: #ddd;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin: 28px 0 10px;
    }

    .page-button {
      min-width: 92px;
      padding: 10px 14px;
    }

    .page-button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
      transform: none;
    }

    .page-info {
      min-width: 150px;
      text-align: center;
      color: #c8d2e0;
      font-weight: bold;
    }

    @media (max-width: 800px) {
      body {
        padding: 20px;
      }

      .game-card {
        flex-direction: column;
      }

      .game-left {
        width: 100%;
      }

      .toolbar input {
        min-width: 0;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <h1>Steam 游戏搜索</h1>

  <div class="button-row">
    <a class="stats-button" href="index.html">折扣列表</a>
    <a class="stats-button" href="search.html">Steam 搜索</a>
    <a class="stats-button" href="favorites.html">收藏</a>
  </div>

  <div class="toolbar">
    <input id="steamKeyword" type="text" placeholder="输入 Steam 游戏名..." onkeydown="handleSearchKey(event)">
    <button class="stats-button" onclick="searchSteam()">搜索</button>

    <select id="sortSelect" onchange="handleListCriteriaChange()">
      <option value="popularity_desc">按热度排序：高到低</option>
      <option value="name_asc">按名称排序：A-Z</option>
      <option value="name_desc">按名称排序：Z-A</option>
      <option value="price_asc">按价格排序：低到高</option>
      <option value="price_desc">按价格排序：高到低</option>
      <option value="discount_desc">按折扣排序：高到低</option>
    </select>
  </div>

  <p id="statusText">请输入关键词搜索 Steam 游戏。</p>
  <div id="games"></div>
  <div id="pagination" class="pagination" style="display: none;">
    <button id="prevPageButton" class="page-button" onclick="changePage(-1)">上一页</button>
    <span id="pageInfo" class="page-info">第 1 / 1 页</span>
    <button id="nextPageButton" class="page-button" onclick="changePage(1)">下一页</button>
  </div>

<script>
  const SEARCH_ENDPOINT = 'https://steam.nin508404.workers.dev/api/search';
  const CLOUD_FAVORITES_ENDPOINT = 'https://steam.nin508404.workers.dev/api/favorites';
  const FAVORITES_KEY = 'steamDealFavorites';
  const SYNC_KEY_STORAGE = 'steamFavoritesSyncKey';
  const PAGE_SIZE = 50;

  let searchResults = [];
  let currentPage = 1;

  function escapeHTML(text) {
    if (!text) return '';

    return String(text)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  function normalizeGame(game) {
    return {
      appid: game.appid,
      name: game.name || 'Unknown Game',
      discount: Number(game.discount || 0),
      original_price: game.original_price || game.price_overview?.initial_formatted || '未知',
      final_price: game.final_price || game.price_overview?.final_formatted || '未知',
      final_price_num: Number(game.final_price_num || game.price_overview?.final || 0) / (game.price_overview ? 100 : 1),
      description: game.description || game.short_description || '暂无简介',
      popularity: Number(game.popularity || game.recommendations?.total || 0),
      image_url: game.image_url || game.header_image || `https://cdn.akamai.steamstatic.com/steam/apps/${game.appid}/header.jpg`,
      genres: Array.isArray(game.genres) ? game.genres : [],
      categories: Array.isArray(game.categories) ? game.categories : [],
      metacritic_score: game.metacritic_score || game.metacritic?.score || null,
      release_date: game.release_date || game.release_date_text || '未知',
      developers: Array.isArray(game.developers) ? game.developers : [],
      publishers: Array.isArray(game.publishers) ? game.publishers : [],
      platforms: game.platforms || {},
      url: game.url || `https://store.steampowered.com/app/${game.appid}`,
      top_review: game.top_review || null
    };
  }

  function getFavorites() {
    return JSON.parse(localStorage.getItem(FAVORITES_KEY) || '{}');
  }

  function saveFavorites(favorites) {
    localStorage.setItem(FAVORITES_KEY, JSON.stringify(favorites));
    syncFavoritesToCloud(favorites);
  }

  function getSyncKey() {
    return localStorage.getItem(SYNC_KEY_STORAGE) || '';
  }

  async function syncFavoritesToCloud(favorites) {
    const syncKey = getSyncKey();

    if (!syncKey) return;

    try {
      await fetch(`${CLOUD_FAVORITES_ENDPOINT}?key=${encodeURIComponent(syncKey)}`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ games: favorites }),
      });
    } catch (error) {
      console.error('Cloud favorite sync failed', error);
    }
  }

  function isFavorite(appid) {
    return Boolean(getFavorites()[appid]);
  }

  function toggleFavorite(appid) {
    const favorites = getFavorites();
    const game = searchResults.find(item => String(item.appid) === String(appid));

    if (!game) return;

    if (favorites[appid]) {
      delete favorites[appid];
    } else {
      favorites[appid] = game;
    }

    saveFavorites(favorites);
    renderResults();
  }

  function sortGames(games, sortType) {
    const sortedGames = [...games];

    sortedGames.sort((a, b) => {
      if (sortType === 'name_asc') return a.name.localeCompare(b.name);
      if (sortType === 'name_desc') return b.name.localeCompare(a.name);
      if (sortType === 'price_asc') return (a.final_price_num || 0) - (b.final_price_num || 0);
      if (sortType === 'price_desc') return (b.final_price_num || 0) - (a.final_price_num || 0);
      if (sortType === 'discount_desc') return (b.discount || 0) - (a.discount || 0);
      return (b.popularity || 0) - (a.popularity || 0);
    });

    return sortedGames;
  }

  function getPageItems(items, page, pageSize) {
    const startIndex = (page - 1) * pageSize;

    return {
      items: items.slice(startIndex, startIndex + pageSize),
      startIndex
    };
  }

  function updatePaginationControls(totalItems) {
    const totalPages = Math.max(1, Math.ceil(totalItems / PAGE_SIZE));

    document.getElementById('pagination').style.display = totalItems > PAGE_SIZE ? 'flex' : 'none';
    document.getElementById('pageInfo').innerText = `第 ${currentPage} / ${totalPages} 页`;
    document.getElementById('prevPageButton').disabled = currentPage <= 1;
    document.getElementById('nextPageButton').disabled = currentPage >= totalPages;
  }

  function renderGameCards(container, games) {
    games.forEach(game => {
      const review = game.top_review || {};
      const imageUrl = game.image_url || `https://cdn.akamai.steamstatic.com/steam/apps/${game.appid}/header.jpg`;
      const genres = Array.isArray(game.genres) && game.genres.length > 0 ? game.genres : ['暂无类型'];
      const categories = Array.isArray(game.categories) && game.categories.length > 0 ? game.categories : [];
      const genreHTML = genres.slice(0, 4).map(item => `<span class="tag">${escapeHTML(item)}</span>`).join('');
      const categoryHTML = categories.slice(0, 3).map(item => `<span class="tag">${escapeHTML(item)}</span>`).join('');
      const scoreText = game.metacritic_score ? `${game.metacritic_score} / 100` : '暂无评分';
      const platformList = [];

      if (game.platforms?.windows) platformList.push('Windows');
      if (game.platforms?.mac) platformList.push('macOS');
      if (game.platforms?.linux) platformList.push('Linux');

      const platformText = platformList.length > 0 ? platformList.join(' / ') : '未知平台';
      const developerText = Array.isArray(game.developers) && game.developers.length > 0 ? game.developers.join(' / ') : '未知开发商';
      const publisherText = Array.isArray(game.publishers) && game.publishers.length > 0 ? game.publishers.join(' / ') : '未知发行商';
      const favorite = isFavorite(game.appid);

      const div = document.createElement('div');
      div.className = 'game';
      div.innerHTML = `
        <div class="game-card">
          <div class="game-left">
            <div class="game-cover-wrap">
              <img class="game-cover" src="${escapeHTML(imageUrl)}" alt="${escapeHTML(game.name)}" loading="lazy" onerror="this.style.display='none'">
            </div>
            <div class="cover-meta">
              <div class="score-pill">评分：${escapeHTML(scoreText)}</div>
              <div class="side-line">类型：</div>
              <div class="tag-list">${genreHTML}</div>
              ${categoryHTML ? `<div class="side-line" style="margin-top: 10px;">特性：</div><div class="tag-list">${categoryHTML}</div>` : ''}
              <div class="side-line" style="margin-top: 10px;">平台：${escapeHTML(platformText)}</div>
              <div class="side-line">发行日期：${escapeHTML(game.release_date || '未知')}</div>
              <div class="side-line">开发商：${escapeHTML(developerText)}</div>
              <div class="side-line">发行商：${escapeHTML(publisherText)}</div>
            </div>
          </div>
          <div class="game-info">
            <h2>${escapeHTML(game.name)}</h2>
            <p>
              折扣：<span class="discount">-${game.discount || 0}%</span>
              ｜ 现价：${escapeHTML(game.final_price)}
              ｜ 原价：${escapeHTML(game.original_price)}
            </p>
            <p class="meta">热度：${Number(game.popularity || 0).toLocaleString()} 条推荐/评论</p>
            <p class="description">${escapeHTML(game.description || '暂无简介')}</p>
            <div class="review">
              <strong>热门评论：</strong>
              <p>${escapeHTML(review.text || '暂无热门评论')}</p>
              <p class="meta">有用票数：${Number(review.votes_up || 0).toLocaleString()}</p>
            </div>
            <p>
              <button class="favorite-button ${favorite ? 'is-favorite' : ''}" onclick="toggleFavorite(${Number(game.appid)})">
                ${favorite ? '取消收藏' : '加入收藏'}
              </button>
              <a href="${escapeHTML(game.url)}" target="_blank" style="margin-left: 12px;">查看 Steam 页面</a>
            </p>
          </div>
        </div>
      `;

      container.appendChild(div);
    });
  }

  function renderResults() {
    const sortType = document.getElementById('sortSelect')?.value || 'popularity_desc';
    const games = sortGames(searchResults, sortType);
    const totalPages = Math.max(1, Math.ceil(games.length / PAGE_SIZE));
    const container = document.getElementById('games');

    currentPage = Math.min(Math.max(currentPage, 1), totalPages);
    container.innerHTML = '';
    updatePaginationControls(games.length);

    if (games.length === 0) {
      document.getElementById('statusText').innerText = '暂无搜索结果。';
      return;
    }

    const { items: pageGames, startIndex } = getPageItems(games, currentPage, PAGE_SIZE);
    document.getElementById('statusText').innerText = `当前显示 ${startIndex + 1}-${startIndex + pageGames.length} / ${games.length} 个搜索结果`;
    renderGameCards(container, pageGames);
  }

  async function searchSteam() {
    const keyword = document.getElementById('steamKeyword').value.trim();

    if (!keyword) {
      document.getElementById('statusText').innerText = '请输入关键词搜索 Steam 游戏。';
      return;
    }

    currentPage = 1;
    document.getElementById('statusText').innerText = '正在搜索 Steam...';
    document.getElementById('games').innerHTML = '';

    try {
      const url = `${SEARCH_ENDPOINT}?q=${encodeURIComponent(keyword)}&page=1`;
      const response = await fetch(url);

      if (!response.ok) {
        throw new Error(`搜索接口返回 ${response.status}`);
      }

      const data = await response.json();
      const rawResults = data.results || data.deals || data.games || [];
      searchResults = rawResults.map(normalizeGame).filter(game => game.appid);
      renderResults();
    } catch (error) {
      console.error(error);
      document.getElementById('statusText').innerText = '搜索失败，请确认 Cloudflare Worker 的 /api/search 已部署并可访问。';
    }
  }

  function handleSearchKey(event) {
    if (event.key === 'Enter') {
      searchSteam();
    }
  }

  function handleListCriteriaChange() {
    currentPage = 1;
    renderResults();
  }

  function changePage(direction) {
    const totalPages = Math.max(1, Math.ceil(searchResults.length / PAGE_SIZE));
    currentPage = Math.min(Math.max(currentPage + direction, 1), totalPages);
    renderResults();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  document.addEventListener('pointermove', (event) => {
    document.documentElement.style.setProperty('--mouse-x', `${event.clientX}px`);
    document.documentElement.style.setProperty('--mouse-y', `${event.clientY}px`);
  });
</script>
</body>
</html>
