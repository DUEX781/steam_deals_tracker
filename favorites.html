<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Steam 收藏游戏</title>
  <style>
    :root {
      --mouse-x: 50vw;
      --mouse-y: 50vh;
    }

    body {
      font-family: Arial, sans-serif;
      max-width: 1100px;
      margin: 0 auto;
      padding: 30px;
      color: #e8f0ff;
      background: #070b12;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -2;
      background:
        radial-gradient(circle at var(--mouse-x) var(--mouse-y), rgba(102, 192, 244, 0.22), transparent 15%),
        radial-gradient(circle at 15% 20%, rgba(164, 208, 7, 0.12), transparent 28%),
        radial-gradient(circle at 85% 70%, rgba(95, 80, 255, 0.16), transparent 32%),
        linear-gradient(135deg, #070b12 0%, #0d1624 45%, #101827 100%);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      background-image:
        linear-gradient(rgba(102, 192, 244, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(102, 192, 244, 0.06) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent 80%);
      animation: gridMove 18s linear infinite;
    }

    @keyframes gridMove {
      from { background-position: 0 0; }
      to { background-position: 84px 84px; }
    }

    h1 {
      color: #8ecbf7;
      font-size: 42px;
      letter-spacing: 1px;
      text-shadow: 0 0 18px rgba(102, 192, 244, 0.35);
    }

    a {
      color: #8ecbf7;
    }

    .button-row,
    .toolbar {
      display: flex;
      gap: 14px;
      margin: 24px 0;
      flex-wrap: wrap;
      align-items: center;
    }

    .nav-row {
      justify-content: space-between;
    }

    .nav-links,
    .nav-actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
    }

    .toolbar input,
    .toolbar select {
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(102, 192, 244, 0.25);
      background: rgba(255, 255, 255, 0.92);
      font-size: 15px;
      outline: none;
    }

    .toolbar input {
      min-width: 260px;
    }

    .stats-button,
    .favorite-button,
    .page-button {
      background: linear-gradient(135deg, #66c0f4, #a4d007);
      color: #07111e;
      border: none;
      padding: 12px 18px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(102, 192, 244, 0.25);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      text-decoration: none;
    }

    .stats-button:hover,
    .favorite-button:hover,
    .page-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 28px rgba(102, 192, 244, 0.45);
    }

    .nav-button {
      box-sizing: border-box;
      width: auto;
      height: auto;
      padding: 12px 18px;
      margin: 0;
      font: inherit;
      font-weight: bold;
      text-align: center;
      white-space: nowrap;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin: 20px 0;
    }

    .filter-field {
      background: #111820;
      padding: 14px;
      border-radius: 8px;
    }

    .sync-panel {
      background: rgba(17, 24, 32, 0.82);
      border: 1px solid rgba(102, 192, 244, 0.18);
      border-radius: 12px;
      padding: 14px;
      margin: 18px 0 24px;
    }

    .sync-panel input {
      min-width: 280px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(102, 192, 244, 0.25);
      background: rgba(255, 255, 255, 0.92);
      font-size: 15px;
      outline: none;
    }

    .sync-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-field label {
      display: block;
      margin-bottom: 8px;
      color: #c8d2e0;
      font-weight: bold;
    }

    .filter-field select {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid rgba(102, 192, 244, 0.25);
      background: rgba(255, 255, 255, 0.92);
      font-size: 14px;
    }

    .game {
      position: relative;
      background: rgba(27, 40, 56, 0.72);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(102, 192, 244, 0.18);
      padding: 20px;
      margin-bottom: 22px;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .game:hover {
      transform: translateY(-5px) scale(1.01);
      border-color: rgba(102, 192, 244, 0.5);
      box-shadow: 0 22px 65px rgba(102, 192, 244, 0.16);
    }

    .game-card {
      position: relative;
      display: flex;
      gap: 24px;
      align-items: flex-start;
      z-index: 1;
    }

    .game-left {
      width: 300px;
      flex-shrink: 0;
    }

    .game-cover-wrap {
      overflow: hidden;
      border-radius: 14px;
      background: #111820;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    .game-cover {
      width: 100%;
      display: block;
      object-fit: cover;
    }

    .cover-meta {
      margin-top: 12px;
      background: rgba(7, 11, 18, 0.65);
      border: 1px solid rgba(102, 192, 244, 0.15);
      border-radius: 14px;
      padding: 12px;
    }

    .score-pill {
      display: inline-block;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(164, 208, 7, 0.15);
      color: #a4d007;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .side-line {
      color: #c8d2e0;
      font-size: 14px;
      line-height: 1.6;
    }

    .tag-list {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .tag {
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 12px;
      color: #dbeafe;
      background: rgba(102, 192, 244, 0.14);
      border: 1px solid rgba(102, 192, 244, 0.18);
    }

    .game-info {
      flex: 1;
    }

    .game-info h2 {
      font-size: 28px;
      margin-top: 4px;
      margin-bottom: 18px;
    }

    .discount {
      color: #a4d007;
      font-weight: bold;
    }

    .meta {
      color: #aab6c5;
      font-size: 14px;
    }

    .description {
      color: #d6deeb;
      line-height: 1.7;
    }

    .review {
      background: rgba(7, 11, 18, 0.68);
      padding: 15px;
      border-radius: 12px;
      margin-top: 14px;
      color: #ddd;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin: 28px 0 10px;
    }

    .page-button {
      min-width: 92px;
      padding: 10px 14px;
    }

    .page-button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
      transform: none;
    }

    .page-info {
      min-width: 150px;
      text-align: center;
      color: #c8d2e0;
      font-weight: bold;
    }

    @media (max-width: 800px) {
      body {
        padding: 20px;
      }

      .filter-grid {
        grid-template-columns: 1fr;
      }

      .game-card {
        flex-direction: column;
      }

      .game-left {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <h1>Steam 收藏游戏</h1>

  <div class="button-row nav-row">
    <div class="nav-links">
      <a class="stats-button nav-button" href="index.html">折扣列表</a>
      <a class="stats-button nav-button" href="search.html">Steam 搜索</a>
      <a class="stats-button nav-button" href="favorites.html">收藏</a>
    </div>
    <div class="nav-actions">
      <button class="stats-button nav-button" onclick="refreshCurrentPageFavorites()">更新本页</button>
    </div>
  </div>

  <div class="sync-panel">
    <div class="sync-row">
      <input id="syncKeyInput" type="text" placeholder="输入收藏同步码">
      <button class="stats-button" onclick="connectSyncKey()">连接同步码</button>
      <button class="stats-button" onclick="saveCloudFavorites()">保存到云端</button>
    </div>
    <p id="syncStatus" class="meta">未连接云端收藏。</p>
  </div>

  <div class="toolbar">
    <input id="searchInput" type="text" placeholder="搜索收藏游戏名..." oninput="handleListCriteriaChange()">

    <select id="sortSelect" onchange="handleListCriteriaChange()">
      <option value="popularity_desc">按热度排序：高到低</option>
      <option value="name_asc">按名称排序：A-Z</option>
      <option value="name_desc">按名称排序：Z-A</option>
      <option value="price_asc">按价格排序：低到高</option>
      <option value="price_desc">按价格排序：高到低</option>
      <option value="discount_desc">按折扣排序：高到低</option>
    </select>
  </div>

  <div class="filter-grid">
    <div class="filter-field">
      <label for="discountFilter">折扣力度</label>
      <select id="discountFilter" onchange="handleListCriteriaChange()">
        <option value="all">全部折扣</option>
        <option value="80">80% 及以上</option>
        <option value="70">70% 及以上</option>
        <option value="50">50% 及以上</option>
        <option value="30">30% 及以上</option>
      </select>
    </div>

    <div class="filter-field">
      <label for="priceFilter">价格区间</label>
      <select id="priceFilter" onchange="handleListCriteriaChange()">
        <option value="all">全部价格</option>
        <option value="0-20">¥20 以内</option>
        <option value="20-50">¥20 - ¥50</option>
        <option value="50-100">¥50 - ¥100</option>
        <option value="100-999999">¥100 以上</option>
      </select>
    </div>

    <div class="filter-field">
      <label for="genreFilter">游戏类型</label>
      <select id="genreFilter" onchange="handleListCriteriaChange()">
        <option value="all">全部类型</option>
      </select>
    </div>
  </div>

  <p id="gameCount"></p>
  <p id="refreshStatus" class="meta"></p>
  <div id="games"></div>
  <div id="pagination" class="pagination" style="display: none;">
    <button id="prevPageButton" class="page-button" onclick="changePage(-1)">上一页</button>
    <span id="pageInfo" class="page-info">第 1 / 1 页</span>
    <button id="nextPageButton" class="page-button" onclick="changePage(1)">下一页</button>
  </div>

<script>
  const FAVORITES_KEY = 'steamDealFavorites';
  const REFRESH_ENDPOINT = 'https://steam.nin508404.workers.dev/api/apps';
  const CLOUD_FAVORITES_ENDPOINT = 'https://steam.nin508404.workers.dev/api/favorites';
  const SYNC_KEY_STORAGE = 'steamFavoritesSyncKey';
  const PAGE_SIZE = 20;

  let favoriteGames = [];
  let currentPage = 1;

  function escapeHTML(text) {
    if (!text) return '';

    return String(text)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  function getFavorites() {
    return JSON.parse(localStorage.getItem(FAVORITES_KEY) || '{}');
  }

  function saveFavorites(favorites) {
    localStorage.setItem(FAVORITES_KEY, JSON.stringify(favorites));
    syncFavoritesToCloud(favorites);
  }

  function getSyncKey() {
    return localStorage.getItem(SYNC_KEY_STORAGE) || '';
  }

  function setSyncKey(syncKey) {
    if (syncKey) {
      localStorage.setItem(SYNC_KEY_STORAGE, syncKey);
    } else {
      localStorage.removeItem(SYNC_KEY_STORAGE);
    }

    document.getElementById('syncKeyInput').value = syncKey;
  }

  function getSyncEndpoint(syncKey) {
    return `${CLOUD_FAVORITES_ENDPOINT}?key=${encodeURIComponent(syncKey)}`;
  }

  function isValidSyncKey(syncKey) {
    return /^[a-zA-Z0-9_-]{8,64}$/.test(syncKey);
  }

  function updateSyncStatus(message) {
    document.getElementById('syncStatus').innerText = message;
  }

  async function syncFavoritesToCloud(favorites = getFavorites()) {
    const syncKey = getSyncKey();

    if (!syncKey) return;

    try {
      const response = await fetch(getSyncEndpoint(syncKey), {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ games: favorites }),
      });

      if (!response.ok) {
        throw new Error(`云端保存返回 ${response.status}`);
      }

      const data = await response.json();
      updateSyncStatus(`已连接云端收藏：${syncKey}，云端收藏 ${data.count || 0} 个。`);
    } catch (error) {
      console.error(error);
      updateSyncStatus('云端保存失败，请确认 Worker KV 已绑定并部署。');
    }
  }

  async function loadCloudFavorites(syncKey) {
    const response = await fetch(getSyncEndpoint(syncKey));

    if (!response.ok) {
      throw new Error(`云端读取返回 ${response.status}`);
    }

    const data = await response.json();

    return data.games && typeof data.games === 'object' ? data.games : {};
  }

  async function connectSyncKey() {
    const syncKey = document.getElementById('syncKeyInput').value.trim();

    if (!syncKey) {
      setSyncKey('');
      localStorage.removeItem(FAVORITES_KEY);
      favoriteGames = [];
      currentPage = 1;
      populateGenreFilter();
      renderFavorites();
      updateSyncStatus('未连接云端收藏，收藏页已重置为空。');
      return;
    }

    if (!isValidSyncKey(syncKey)) {
      updateSyncStatus('同步码需为 8-64 位字母、数字、下划线或短横线。');
      return;
    }

    try {
      updateSyncStatus('正在连接云端收藏...');
      const cloudFavorites = await loadCloudFavorites(syncKey);

      setSyncKey(syncKey);
      localStorage.setItem(FAVORITES_KEY, JSON.stringify(cloudFavorites));
      favoriteGames = Object.values(cloudFavorites);
      currentPage = 1;
      populateGenreFilter();
      renderFavorites();
      updateSyncStatus(`已连接云端收藏：${syncKey}，当前收藏 ${favoriteGames.length} 个。`);
    } catch (error) {
      console.error(error);
      updateSyncStatus('连接失败，请确认同步码和 Cloudflare Worker 配置。');
    }
  }

  async function saveCloudFavorites() {
    const syncKey = document.getElementById('syncKeyInput').value.trim() || getSyncKey();

    if (!isValidSyncKey(syncKey)) {
      updateSyncStatus('请先创建或输入有效同步码。');
      return;
    }

    setSyncKey(syncKey);
    updateSyncStatus('正在保存到云端...');
    await syncFavoritesToCloud(getFavorites());
  }

  function getCurrentPageFavoriteGames() {
    const games = getFilteredSortedGames();
    const totalPages = Math.max(1, Math.ceil(games.length / PAGE_SIZE));

    currentPage = Math.min(Math.max(currentPage, 1), totalPages);

    return getPageItems(games, currentPage, PAGE_SIZE).items;
  }

  function removeFavorite(appid) {
    const favorites = getFavorites();
    delete favorites[appid];
    saveFavorites(favorites);
    loadFavorites();
  }

  function populateGenreFilter() {
    const genreSelect = document.getElementById('genreFilter');
    const genres = new Set();

    favoriteGames.forEach(game => {
      if (!Array.isArray(game.genres)) return;
      game.genres.forEach(genre => {
        if (genre) genres.add(genre);
      });
    });

    const selectedGenre = genreSelect.value;
    genreSelect.innerHTML = '<option value="all">全部类型</option>';

    [...genres]
      .sort((a, b) => a.localeCompare(b, 'zh-CN'))
      .forEach(genre => {
        const option = document.createElement('option');
        option.value = genre;
        option.textContent = genre;
        genreSelect.appendChild(option);
      });

    genreSelect.value = [...genres].includes(selectedGenre) ? selectedGenre : 'all';
  }

  function gameMatchesFilters(game) {
    const discountFilter = document.getElementById('discountFilter').value;
    const priceFilter = document.getElementById('priceFilter').value;
    const genreFilter = document.getElementById('genreFilter').value;

    if (discountFilter !== 'all' && (game.discount || 0) < Number(discountFilter)) {
      return false;
    }

    if (priceFilter !== 'all') {
      const [minPrice, maxPrice] = priceFilter.split('-').map(Number);
      const price = Number(game.final_price_num || 0);

      if (price < minPrice || price > maxPrice) {
        return false;
      }
    }

    if (genreFilter !== 'all') {
      const genres = Array.isArray(game.genres) ? game.genres : [];

      if (!genres.includes(genreFilter)) {
        return false;
      }
    }

    return true;
  }

  function sortGames(games, sortType) {
    const sortedGames = [...games];

    sortedGames.sort((a, b) => {
      if (sortType === 'name_asc') return a.name.localeCompare(b.name);
      if (sortType === 'name_desc') return b.name.localeCompare(a.name);
      if (sortType === 'price_asc') return (a.final_price_num || 0) - (b.final_price_num || 0);
      if (sortType === 'price_desc') return (b.final_price_num || 0) - (a.final_price_num || 0);
      if (sortType === 'discount_desc') return (b.discount || 0) - (a.discount || 0);
      return (b.popularity || 0) - (a.popularity || 0);
    });

    return sortedGames;
  }

  function getFilteredSortedGames() {
    const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
    const sortType = document.getElementById('sortSelect').value;

    return sortGames(
      favoriteGames.filter(game => game.name.toLowerCase().includes(keyword) && gameMatchesFilters(game)),
      sortType
    );
  }

  function getPageItems(items, page, pageSize) {
    const startIndex = (page - 1) * pageSize;

    return {
      items: items.slice(startIndex, startIndex + pageSize),
      startIndex
    };
  }

  function updatePaginationControls(totalItems) {
    const totalPages = Math.max(1, Math.ceil(totalItems / PAGE_SIZE));

    document.getElementById('pagination').style.display = totalItems > PAGE_SIZE ? 'flex' : 'none';
    document.getElementById('pageInfo').innerText = `第 ${currentPage} / ${totalPages} 页`;
    document.getElementById('prevPageButton').disabled = currentPage <= 1;
    document.getElementById('nextPageButton').disabled = currentPage >= totalPages;
  }

  function renderGameCards(container, games) {
    games.forEach(game => {
      const review = game.top_review || {};
      const imageUrl = game.image_url || `https://cdn.akamai.steamstatic.com/steam/apps/${game.appid}/header.jpg`;
      const genres = Array.isArray(game.genres) && game.genres.length > 0 ? game.genres : ['暂无类型'];
      const categories = Array.isArray(game.categories) && game.categories.length > 0 ? game.categories : [];
      const genreHTML = genres.slice(0, 4).map(item => `<span class="tag">${escapeHTML(item)}</span>`).join('');
      const categoryHTML = categories.slice(0, 3).map(item => `<span class="tag">${escapeHTML(item)}</span>`).join('');
      const scoreText = game.metacritic_score ? `${game.metacritic_score} / 100` : '暂无评分';
      const platformList = [];

      if (game.platforms?.windows) platformList.push('Windows');
      if (game.platforms?.mac) platformList.push('macOS');
      if (game.platforms?.linux) platformList.push('Linux');

      const platformText = platformList.length > 0 ? platformList.join(' / ') : '未知平台';
      const developerText = Array.isArray(game.developers) && game.developers.length > 0 ? game.developers.join(' / ') : '未知开发商';
      const publisherText = Array.isArray(game.publishers) && game.publishers.length > 0 ? game.publishers.join(' / ') : '未知发行商';

      const div = document.createElement('div');
      div.className = 'game';
      div.innerHTML = `
        <div class="game-card">
          <div class="game-left">
            <div class="game-cover-wrap">
              <img class="game-cover" src="${escapeHTML(imageUrl)}" alt="${escapeHTML(game.name)}" loading="lazy" onerror="this.style.display='none'">
            </div>
            <div class="cover-meta">
              <div class="score-pill">评分：${escapeHTML(scoreText)}</div>
              <div class="side-line">类型：</div>
              <div class="tag-list">${genreHTML}</div>
              ${categoryHTML ? `<div class="side-line" style="margin-top: 10px;">特性：</div><div class="tag-list">${categoryHTML}</div>` : ''}
              <div class="side-line" style="margin-top: 10px;">平台：${escapeHTML(platformText)}</div>
              <div class="side-line">发行日期：${escapeHTML(game.release_date || '未知')}</div>
              <div class="side-line">开发商：${escapeHTML(developerText)}</div>
              <div class="side-line">发行商：${escapeHTML(publisherText)}</div>
            </div>
          </div>
          <div class="game-info">
            <h2>${escapeHTML(game.name)}</h2>
            <p>
              折扣：<span class="discount">-${game.discount || 0}%</span>
              ｜ 现价：${escapeHTML(game.final_price)}
              ｜ 原价：${escapeHTML(game.original_price)}
            </p>
            <p class="meta">热度：${Number(game.popularity || 0).toLocaleString()} 条推荐/评论</p>
            <p class="description">${escapeHTML(game.description || '暂无简介')}</p>
            <div class="review">
              <strong>热门评论：</strong>
              <p>${escapeHTML(review.text || '暂无热门评论')}</p>
              <p class="meta">有用票数：${Number(review.votes_up || 0).toLocaleString()}</p>
            </div>
            <p>
              <button class="favorite-button" onclick="removeFavorite(${Number(game.appid)})">取消收藏</button>
              <a href="${escapeHTML(game.url)}" target="_blank" style="margin-left: 12px;">查看 Steam 页面</a>
            </p>
          </div>
        </div>
      `;

      container.appendChild(div);
    });
  }

  function renderFavorites() {
    const games = getFilteredSortedGames();
    const totalPages = Math.max(1, Math.ceil(games.length / PAGE_SIZE));
    const container = document.getElementById('games');

    currentPage = Math.min(Math.max(currentPage, 1), totalPages);
    container.innerHTML = '';
    updatePaginationControls(games.length);

    if (favoriteGames.length === 0) {
      document.getElementById('gameCount').innerText = '暂无收藏游戏。';
      container.innerHTML = '<p>你可以先在 Steam 搜索页把游戏加入收藏。</p>';
      return;
    }

    if (games.length === 0) {
      document.getElementById('gameCount').innerText = `当前显示 0 / ${favoriteGames.length} 个收藏游戏`;
      container.innerHTML = '<p>没有找到符合条件的收藏游戏。</p>';
      return;
    }

    const { items: pageGames, startIndex } = getPageItems(games, currentPage, PAGE_SIZE);
    document.getElementById('gameCount').innerText = `当前显示 ${startIndex + 1}-${startIndex + pageGames.length} / ${games.length} 个收藏游戏`;
    renderGameCards(container, pageGames);
  }

  async function refreshCurrentPageFavorites() {
    const pageGames = getCurrentPageFavoriteGames();
    const status = document.getElementById('refreshStatus');

    if (pageGames.length === 0) {
      status.innerText = '当前页没有可更新的收藏游戏。';
      return;
    }

    const appids = pageGames.map(game => game.appid).filter(Boolean);
    const uniqueAppids = [...new Set(appids)].slice(0, PAGE_SIZE);

    status.innerText = `正在更新本页 ${uniqueAppids.length} 个收藏游戏...`;

    try {
      const response = await fetch(`${REFRESH_ENDPOINT}?ids=${uniqueAppids.join(',')}`);

      if (!response.ok) {
        throw new Error(`刷新接口返回 ${response.status}`);
      }

      const data = await response.json();
      const refreshedGames = Array.isArray(data.results) ? data.results : [];
      const favorites = getFavorites();

      refreshedGames.forEach(game => {
        if (game.appid) {
          favorites[game.appid] = game;
        }
      });

      saveFavorites(favorites);
      favoriteGames = Object.values(favorites);
      populateGenreFilter();
      renderFavorites();

      status.innerText = `已更新本页 ${refreshedGames.length} 个收藏游戏。`;
    } catch (error) {
      console.error(error);
      status.innerText = '更新失败，请确认 Cloudflare Worker 的 /api/apps 已部署并可访问。';
    }
  }

  function handleListCriteriaChange() {
    currentPage = 1;
    renderFavorites();
  }

  function changePage(direction) {
    const games = getFilteredSortedGames();
    const totalPages = Math.max(1, Math.ceil(games.length / PAGE_SIZE));
    currentPage = Math.min(Math.max(currentPage + direction, 1), totalPages);
    renderFavorites();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function loadFavorites() {
    const syncKey = getSyncKey();

    if (!syncKey) {
      localStorage.removeItem(FAVORITES_KEY);
      favoriteGames = [];
      currentPage = 1;
      document.getElementById('syncKeyInput').value = '';
      updateSyncStatus('未连接云端收藏，收藏页为空。');
      populateGenreFilter();
      renderFavorites();
      return;
    }

    document.getElementById('syncKeyInput').value = syncKey;
    updateSyncStatus(`已连接云端收藏：${syncKey}`);
    favoriteGames = Object.values(getFavorites());
    populateGenreFilter();
    renderFavorites();
  }

  document.addEventListener('pointermove', (event) => {
    document.documentElement.style.setProperty('--mouse-x', `${event.clientX}px`);
    document.documentElement.style.setProperty('--mouse-y', `${event.clientY}px`);
  });

  loadFavorites();
</script>
</body>
</html>
